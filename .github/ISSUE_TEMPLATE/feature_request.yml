name: Feature request
description: Propose a new queue capability, event type, CLI surface, or operator workflow.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or dispatcher problem is not handled well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior, command surface, or schema/event changes you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List workarounds or rejected approaches if you already explored them.
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Explain how this would affect operators, workers, or downstream automation.
